<!DOCTYPE html>
<html>
<head>
<style>
html { background: #FFFFFF; }
body {
    width: 720pt; height: 405pt; margin: 0; padding: 0;
    background: #f7fafc;
    font-family: Arial, sans-serif;
    display: flex;
    flex-direction: column;
}
.header {
    background: #1a365d;
    padding: 15pt 30pt;
}
h1 {
    color: #FFFFFF;
    font-size: 22pt;
    margin: 0;
}
.content {
    flex: 1;
    padding: 20pt 30pt;
    overflow: hidden;
}

.framework {
    display: flex;
    justify-content: space-between;
    height: 100%;
    gap: 8pt;
}
.wu-item {
    flex: 1;
    background: #FFFFFF;
    border-radius: 8pt;
    padding: 12pt 8pt;
    text-align: center;
    box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
}
.wu-icon {
    font-size: 26pt;
    margin-bottom: 8pt;
}
.wu-title {
    font-size: 13pt;
    font-weight: bold;
    color: #1a365d;
    margin-bottom: 6pt;
}
.wu-desc {
    font-size: 9pt;
    color: #666;
    text-align: center;
    line-height: 1.4;
}

</style>
</head>
<body>
<div class="header">
    <h1>五看分析框架</h1>
</div>
<div class="content">
    
<div class="framework">
    <div class="wu-item">
        <div class="wu-icon">📈</div>
        <div class="wu-title">看趋势</div>
        <div class="wu-desc">AI技术发展趋势<br/>行业变革方向</div>
    </div>
    <div class="wu-item">
        <div class="wu-icon">🎯</div>
        <div class="wu-title">看市场</div>
        <div class="wu-desc">客户需求变化<br/>市场机会窗口</div>
    </div>
    <div class="wu-item">
        <div class="wu-icon">⚔️</div>
        <div class="wu-title">看竞争</div>
        <div class="wu-desc">竞争对手布局<br/>行业最佳实践</div>
    </div>
    <div class="wu-item">
        <div class="wu-icon">🔍</div>
        <div class="wu-title">看自己</div>
        <div class="wu-desc">内部能力评估<br/>优势与短板</div>
    </div>
    <div class="wu-item">
        <div class="wu-icon">💡</div>
        <div class="wu-title">看机会</div>
        <div class="wu-desc">战略机会点<br/>破局切入点</div>
    </div>
</div>

</div>
</body>
</html>
